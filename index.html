<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>我的第一个网站</title>
    <style>
        /* 这里就是 CSS，用来控制样式 */
        body {
            background-color: #f0f2f5; /* 改变背景颜色 */
            font-family: 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
        }
        h1 { color: #333; }
        p { color: #666; }
    </style>
</head>
<body>
    <div class="card">
        <h1>你好！</h1>
        <p>欢迎来到我的网站！</p>
    </div>
</body>
</html>
