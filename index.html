<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的高级个人主页</title>
    <style>
        /* 全局去边距，并加入高大上的渐变背景 */
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* 磨砂玻璃质感卡片 (Glassmorphism) */
        .profile-container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 24px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        /* 调整头像框的样式 */
        .avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%; /* 保持圆框 */
            margin: 0 auto 20px;
            overflow: hidden; /* 让超出圆框的图片部分隐藏 */
            border: 3px solid rgba(255, 255, 255, 0.2); /* 给圆框加个精美的淡白色边 */
            box-shadow: 0 0 20px rgba(0, 242, 254, 0.4); /* 保持发光阴影 */
        }

        /* 让标签里的图片完美适应这个圆框 */
        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* 魔法CSS：按比例填满不拉伸 */
        }

        h1 {
            margin: 10px 0;
            font-size: 28px;
            background: linear-gradient(45deg, #00f2fe, #4facfe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            color: #b0bec5;
            font-size: 14px;
            margin-bottom: 30px;
            letter-spacing: 1px;
        }

        /* 高级链接按钮列表 */
        .links-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .link-item {
            background: rgba(255, 255, 255, 0.1);
            color: #ffffff;
            text-decoration: none;
            padding: 14px;
            border-radius: 12px;
            font-weight: 500;
            transition: all 0.3s ease; /* 丝滑过渡动画 */
            border: 1px solid transparent;
        }

        /* 鼠标悬停（Hover）或手指点击时的酷炫发光效果 */
        .link-item:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-3px); /* 向上微微浮动 */
            border-color: #00f2fe;
            box-shadow: 0 5px 15px rgba(0, 242, 254, 0.3);
        }
    </style>
</head>
<body>

    <div class="profile-container">
        <!-- 💡 核心改动：这里已经帮你直接读取本地的 avatar.jpg 照片了 -->
        <div class="avatar">
            <img src="avatar.jpg" alt="我的本地头像">
        </div>
        
        <h1>探索者</h1>
        <div class="subtitle">WEB 前端开发 · 进化中</div>
        
        <div class="links-list">
            <a href="https://github.com" target="_blank" class="link-item">📈 我的交易日志</a>
            <a href="#" class="link-item">🧘‍♂️ 日常冥想与运动</a>
            <a href="https://github.com" target="_blank" class="link-item">💻 我的 GitHub 主页</a>
        </div>
    </div>

</body>
</html>
